name: CI Tests

# Triggers: on push to relevant paths/branches, pull requests to main, and daily schedule
on:
  push:
    paths:
      - '.github/**'
      - 'config/**'
      - 'framework/**'
      - 'tests/**'
      - 'pytest.ini'
      - 'requirements.txt'
    branches:
      - '**'

  pull_request:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: '30 3 * * *'  # Runs at 09:00 AM IST every day

jobs:
  API-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Dry Run (validate API tests)
        run: |
          robot --dryrun -d dryrun_output tests/api/

      - name: Run API Tests
        run: |
          robot -d output tests/api/

      - name: Upload API Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results-API
          path: output/

  UI-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [CHROME, FIREFOX, EDGE]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        if: ${{ matrix.browser == 'CHROME' }}
        uses: browser-actions/setup-chrome@v1

      - name: Install Firefox
        if: ${{ matrix.browser == 'FIREFOX' }}
        uses: browser-actions/setup-firefox@v1

      - name: Install Edge
        if: ${{ matrix.browser == 'EDGE' }}
        uses: browser-actions/setup-edge@v1

      - name: Dry Run (validate UI tests)
        run: |
          robot --dryrun -d dryrun_output --variable BROWSER:${{ matrix.browser }} --variable HEADLESS:TRUE tests/ui/

      - name: Run UI Tests
        run: |
          robot -d output --variable BROWSER:${{ matrix.browser }} --variable HEADLESS:TRUE tests/ui/

      - name: Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results-${{ matrix.browser }}
          path: output/
