name: CI Tests

# Triggers: on push to relevant paths/branches, pull requests to main, and daily schedule
on:
  push:
    paths:
      - '.github/**'
      - 'config/**'
      - 'framework/**'
      - 'tests/**'
      - 'pytest.ini'
      - 'requirements.txt'
    branches:
      - '**'

  pull_request:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: '30 3 * * *'  # Runs at 09:00 AM IST every day

jobs:
  API-tests:
    runs-on: ubuntu-latest
    outputs:
      total: ${{ steps.stats.outputs.total }}
      passed: ${{ steps.stats.outputs.passed }}
      failed: ${{ steps.stats.outputs.failed }}
      skipped: ${{ steps.stats.outputs.skipped }}
      failed_tests: ${{ steps.stats.outputs.failed_tests }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Dry Run (validate API tests)
        run: |
          robot --dryrun -d dryrun_output tests/api/

      - name: Run API Tests
        run: |
          robot -d output tests/api/

      - name: Parse test statistics
        id: stats
        if: always()
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, os, sys

          path = "output/output.xml"
          if not os.path.exists(path):
              for key in ("total","passed","failed","skipped","failed_tests"):
                  print(f"::set-output name={key}::N/A")
              sys.exit(0)

          tree = ET.parse(path)
          root = tree.getroot()

          stat_el = root.find(".//statistics/total/stat[@name='All Tests']")
          if stat_el is None:
              stat_el = root.find(".//statistics/total/stat")

          passed  = int(stat_el.get("pass",  0)) if stat_el is not None else 0
          failed  = int(stat_el.get("fail",  0)) if stat_el is not None else 0
          skipped = int(stat_el.get("skip",  0)) if stat_el is not None else 0
          total   = passed + failed + skipped

          failed_names = []
          for test in root.iter("test"):
              status_el = test.find("status")
              if status_el is not None and status_el.get("status") == "FAIL":
                  failed_names.append(test.get("name", "unknown"))

          failed_str = ", ".join(failed_names) if failed_names else "None"

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"total={total}\n")
              fh.write(f"passed={passed}\n")
              fh.write(f"failed={failed}\n")
              fh.write(f"skipped={skipped}\n")
              fh.write(f"failed_tests={failed_str}\n")
          PYEOF

      - name: Upload API Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results-API
          path: output/

  UI-tests:
    runs-on: ubuntu-latest
    outputs:
      total: ${{ steps.stats.outputs.total }}
      passed: ${{ steps.stats.outputs.passed }}
      failed: ${{ steps.stats.outputs.failed }}
      skipped: ${{ steps.stats.outputs.skipped }}
      failed_tests: ${{ steps.stats.outputs.failed_tests }}

    strategy:
      fail-fast: false
      matrix:
        browser: [CHROME, FIREFOX, EDGE]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        if: ${{ matrix.browser == 'CHROME' }}
        uses: browser-actions/setup-chrome@v1

      - name: Install Firefox
        if: ${{ matrix.browser == 'FIREFOX' }}
        uses: browser-actions/setup-firefox@v1

      - name: Install Edge
        if: ${{ matrix.browser == 'EDGE' }}
        uses: browser-actions/setup-edge@v1

      - name: Dry Run (validate UI tests)
        run: |
          robot --dryrun -d dryrun_output --variable BROWSER:${{ matrix.browser }} --variable HEADLESS:TRUE tests/ui/

      - name: Run UI Tests
        run: |
          robot -d output --variable BROWSER:${{ matrix.browser }} --variable HEADLESS:TRUE tests/ui/

      - name: Parse test statistics
        id: stats
        if: always()
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, os, sys

          path = "output/output.xml"
          if not os.path.exists(path):
              for key in ("total","passed","failed","skipped","failed_tests"):
                  print(f"::set-output name={key}::N/A")
              sys.exit(0)

          tree = ET.parse(path)
          root = tree.getroot()

          stat_el = root.find(".//statistics/total/stat[@name='All Tests']")
          if stat_el is None:
              stat_el = root.find(".//statistics/total/stat")

          passed  = int(stat_el.get("pass",  0)) if stat_el is not None else 0
          failed  = int(stat_el.get("fail",  0)) if stat_el is not None else 0
          skipped = int(stat_el.get("skip",  0)) if stat_el is not None else 0
          total   = passed + failed + skipped

          failed_names = []
          for test in root.iter("test"):
              status_el = test.find("status")
              if status_el is not None and status_el.get("status") == "FAIL":
                  failed_names.append(test.get("name", "unknown"))

          failed_str = ", ".join(failed_names) if failed_names else "None"

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"total={total}\n")
              fh.write(f"passed={passed}\n")
              fh.write(f"failed={failed}\n")
              fh.write(f"skipped={skipped}\n")
              fh.write(f"failed_tests={failed_str}\n")
          PYEOF

      - name: Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results-${{ matrix.browser }}
          path: output/

  # Notification job: sends CI status to Microsoft Teams via webhook
  notify:
    runs-on: ubuntu-latest
    needs: [API-tests, UI-tests]
    if: always()

    steps:
      - name: Send notification to Microsoft Teams
        run: |
          API_STATUS="${{ needs.API-tests.result }}"
          UI_STATUS="${{ needs.UI-tests.result }}"

          # ── Overall result ────────────────────────────────────────────────────
          if [ "$API_STATUS" = "success" ] && [ "$UI_STATUS" = "success" ]; then
            OVERALL="✅ All Tests Passed"
          else
            OVERALL="❌ Some Tests Failed"
          fi

          # ── API stats ─────────────────────────────────────────────────────────
          API_TOTAL="${{ needs.API-tests.outputs.total }}"
          API_PASSED="${{ needs.API-tests.outputs.passed }}"
          API_FAILED="${{ needs.API-tests.outputs.failed }}"
          API_SKIPPED="${{ needs.API-tests.outputs.skipped }}"
          API_FAILED_TESTS="${{ needs.API-tests.outputs.failed_tests }}"

          # ── UI stats ──────────────────────────────────────────────────────────
          UI_TOTAL="${{ needs.UI-tests.outputs.total }}"
          UI_PASSED="${{ needs.UI-tests.outputs.passed }}"
          UI_FAILED="${{ needs.UI-tests.outputs.failed }}"
          UI_SKIPPED="${{ needs.UI-tests.outputs.skipped }}"
          UI_FAILED_TESTS="${{ needs.UI-tests.outputs.failed_tests }}"

          # ── Combined totals ───────────────────────────────────────────────────
          TOTAL=$(( ${API_TOTAL:-0} + ${UI_TOTAL:-0} ))
          PASSED=$(( ${API_PASSED:-0} + ${UI_PASSED:-0} ))
          FAILED=$(( ${API_FAILED:-0} + ${UI_FAILED:-0} ))
          SKIPPED=$(( ${API_SKIPPED:-0} + ${UI_SKIPPED:-0} ))

          # ── UI failures block (only shown when there are failures) ─────────────
          UI_FAILURES_BLOCK=""
          if [ "${UI_FAILED:-0}" -gt 0 ] 2>/dev/null; then
            UI_FAILURES_BLOCK=",{\"type\":\"TextBlock\",\"text\":\"↳ 🖥️ UI Failures\",\"weight\":\"Bolder\",\"spacing\":\"None\"},{\"type\":\"TextBlock\",\"text\":\"${UI_FAILED_TESTS}\",\"wrap\":true,\"color\":\"Attention\",\"spacing\":\"None\"}"
          fi

          # ── API failures block (only shown when there are failures) ────────────
          API_FAILURES_BLOCK=""
          if [ "${API_FAILED:-0}" -gt 0 ] 2>/dev/null; then
            API_FAILURES_BLOCK=",{\"type\":\"TextBlock\",\"text\":\"↳ 🔌 API Failures\",\"weight\":\"Bolder\",\"spacing\":\"None\"},{\"type\":\"TextBlock\",\"text\":\"${API_FAILED_TESTS}\",\"wrap\":true,\"color\":\"Attention\",\"spacing\":\"None\"}"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "\$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.4",
                  "body": [
                    {
                      "type": "TextBlock",
                      "size": "Large",
                      "weight": "Bolder",
                      "text": "CI Tests — ${OVERALL}"
                    },
                    {
                      "type": "FactSet",
                      "facts": [
                        { "title": "Repository",   "value": "${{ github.repository }}" },
                        { "title": "Branch",        "value": "${{ github.ref_name }}" },
                        { "title": "Triggered by",  "value": "${{ github.actor }}" },
                        { "title": "API Job",       "value": "${API_STATUS}" },
                        { "title": "UI Job",        "value": "${UI_STATUS}" }
                      ]
                    },
                    { "type": "ColumnSet",
                      "columns": [
                        { "type": "Column", "width": "stretch",
                          "items": [
                            { "type": "TextBlock", "text": "Total Tests", "weight": "Bolder" },
                            { "type": "TextBlock", "text": "${TOTAL}", "size": "ExtraLarge", "weight": "Bolder", "spacing": "None" }
                          ]
                        },
                        { "type": "Column", "width": "stretch",
                          "items": [
                            { "type": "TextBlock", "text": "✅ Passed", "weight": "Bolder", "color": "Good" },
                            { "type": "TextBlock", "text": "${PASSED}", "size": "ExtraLarge", "weight": "Bolder", "color": "Good", "spacing": "None" }
                          ]
                        },
                        { "type": "Column", "width": "stretch",
                          "items": [
                            { "type": "TextBlock", "text": "❌ Failed", "weight": "Bolder", "color": "Attention" },
                            { "type": "TextBlock", "text": "${FAILED}", "size": "ExtraLarge", "weight": "Bolder", "color": "Attention", "spacing": "None" }
                          ]
                        },
                        { "type": "Column", "width": "stretch",
                          "items": [
                            { "type": "TextBlock", "text": "⏭️ Skipped", "weight": "Bolder", "color": "Warning" },
                            { "type": "TextBlock", "text": "${SKIPPED}", "size": "ExtraLarge", "weight": "Bolder", "color": "Warning", "spacing": "None" }
                          ]
                        }
                      ]
                    }
                    ${UI_FAILURES_BLOCK}
                    ${API_FAILURES_BLOCK}
                  ],
                  "actions": [
                    {
                      "type": "Action.OpenUrl",
                      "title": "View Run",
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              }
            ]
          }
          EOF
          )

          curl -H "Content-Type: application/json" -d "$PAYLOAD" "${{ secrets.TEAMS_WEBHOOK_URL }}"
