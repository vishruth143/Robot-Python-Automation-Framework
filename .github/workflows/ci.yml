# .github/workflows/ci.yml
name: CI - Robot Framework Parallel Tests

# Triggers: on push to relevant paths/branches, pull requests to main, and daily schedule
on:
  push:
    paths:
      - '.github/**'
      - 'tests/**'
      - 'executor/**'
      - 'requirements.txt'
    branches:
      - '**'

  pull_request:
    branches:
      - main

  schedule:
    - cron: '30 3 * * *'  # Runs at 09:00 AM IST every day

env:
  REGION: QA
  BROWSER: CHROME
  HEADLESS: TRUE

jobs:

  # Lint job: validates Robot Framework .robot files via dry-run
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'  # Uses Python 3.13.7

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint Robot Framework Files (Dry Run)
        run: |
          echo "Running Robot Framework dry-run to validate test syntax..."
          python -m robot --dryrun --outputdir output/lint \
            --variable REGION:${{ env.REGION }} \
            --variable BROWSER:chrome \
            --variable HEADLESS:TRUE \
            tests/api/ tests/ui/heroku/ tests/ui/pta/
          echo "✅ Robot Framework lint (dry-run) passed."

  # Build and test job: runs all tests in parallel using pabot
  build-and-test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Remove pre-installed ChromeDriver (let Selenium Manager resolve it)
        run: |
          sudo rm -f /usr/local/share/chromedriver-linux64/chromedriver
          sudo rm -f /usr/bin/chromedriver

      - name: Verify Chrome
        run: google-chrome --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'  # Uses Python 3.13.7

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run All Tests in Parallel with Pabot
        run: |
          pabot \
            --processes 4 \
            --outputdir output \
            --output output.xml \
            --log log.html \
            --report report.html \
            --variable REGION:${{ env.REGION }} \
            --variable BROWSER:${{ env.BROWSER }} \
            --variable HEADLESS:${{ env.HEADLESS }} \
            tests/api/ tests/ui/heroku/ tests/ui/pta/
        continue-on-error: true

      - name: Upload Robot Framework HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-html-report
          path: |
            output/report.html
            output/log.html

      - name: Upload Robot Framework Output XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-output-xml
          path: output/output.xml
